<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Link Hub</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/6994/6994770.png" type="image/gif" sizes="60x60">
    <link rel="preconnect" href="https://useful-4d6ac-default-rtdb.firebaseio.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        @media (min-width: 1024px) {
            .glass-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        }
        .hidden { display: none !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="min-h-screen p-3 sm:p-4 md:p-6 lg:max-w-7xl lg:mx-auto relative">

    <nav class="flex flex-col md:flex-row justify-between items-center mb-4 sm:mb-6 pb-4 sm:pb-5 border-b border-gray-700 gap-4 mt-2 sm:mt-4">
        <h1 class="text-2xl sm:text-3xl font-extrabold tracking-wider text-blue-400 w-full md:w-auto text-center md:text-left drop-shadow-lg">
            <i class="fa-solid fa-layer-group"></i> LinkHub
        </h1>
        
        <div class="relative w-full md:w-[28rem] order-3 md:order-none">
            <input type="text" id="searchInput" placeholder="Search websites..." class="w-full px-4 sm:px-5 py-2.5 sm:py-3 pl-10 sm:pl-12 rounded-xl bg-gray-800/80 border border-gray-600 focus:outline-none focus:border-blue-400 text-white shadow-inner transition text-sm sm:text-base">
            <i class="fa-solid fa-search absolute left-4 top-3.5 sm:top-4 text-gray-400 text-base sm:text-lg"></i>
        </div>

        <div class="flex flex-wrap sm:flex-nowrap gap-2 sm:gap-3 w-full md:w-auto justify-center md:justify-end">
            <button id="addBtn" class="hidden flex-1 sm:flex-none justify-center bg-green-500 hover:bg-green-600 text-white px-4 py-2.5 rounded-xl font-medium transition shadow-lg flex items-center gap-2 text-sm sm:text-base">
                <i class="fa-solid fa-plus"></i> Add Link
            </button>
            <button id="loginBtn" class="flex-1 sm:flex-none justify-center bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl font-medium transition shadow-lg flex items-center gap-2 text-sm sm:text-base">
                <i class="fa-solid fa-user-lock"></i> Login
            </button>
            <button id="logoutBtn" class="hidden flex-1 sm:flex-none justify-center bg-red-500 hover:bg-red-600 text-white px-4 py-2.5 rounded-xl font-medium transition shadow-lg flex items-center gap-2 text-sm sm:text-base">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </nav>

    <div id="categoryFilters" class="flex overflow-x-auto gap-2 sm:gap-3 py-2 mb-4 scrollbar-hide snap-x"></div>

    <div id="loadingMsg" class="flex flex-col items-center justify-center mt-20 text-gray-400 w-full transition-opacity duration-300">
        <i class="fa-solid fa-spinner fa-spin text-3xl sm:text-4xl mb-4 text-blue-500" id="spinnerIcon"></i>
        <p class="text-base sm:text-lg" id="loadingText">Connecting to workspace...</p>
    </div>

    <div id="linksContainer" class="hidden grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 sm:gap-y-8 sm:gap-x-6 relative mt-4 sm:mt-6"></div>

    <div id="viewModal" class="hidden fixed inset-0 bg-black bg-opacity-80 backdrop-blur-sm flex items-center justify-center z-50 p-3 sm:p-4">
        <div class="glass-card rounded-2xl w-full max-w-sm flex flex-col shadow-2xl border border-gray-600 overflow-hidden relative">
            <div id="modalMaintenanceBadge" class="hidden absolute top-0 left-0 w-full bg-red-600 text-white text-[10px] sm:text-xs text-center py-1 font-bold tracking-widest z-10 animate-pulse">
                <i class="fa-solid fa-server"></i> SERVER MAINTENANCE
            </div>
            <div class="p-4 sm:p-5 pt-6 sm:pt-7 border-b border-gray-700 flex justify-between items-center bg-gray-800 bg-opacity-90">
                <div class="flex items-center gap-3">
                    <img id="viewModalLogo" src="" alt="logo" class="w-8 h-8 sm:w-10 sm:h-10 object-contain bg-white rounded-lg p-1 shadow">
                    <h2 id="viewModalTitle" class="text-lg sm:text-xl font-bold text-white truncate w-40 sm:w-48">Website Name</h2>
                </div>
                <button onclick="closeModal('viewModal')" class="text-gray-400 hover:text-red-400 transition bg-gray-700 hover:bg-gray-600 rounded-full w-8 h-8 flex items-center justify-center text-sm sm:text-base">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="p-4 sm:p-5 overflow-y-auto max-h-[55vh] space-y-2 sm:space-y-3" id="viewModalLinks"></div>
            <div class="p-3 sm:p-4 border-t border-gray-700 bg-gray-900 flex justify-center">
                <a id="viewModalMainLink" href="#" target="_blank" class="w-full text-center px-4 sm:px-5 py-2.5 sm:py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-bold transition shadow-lg flex justify-center items-center gap-2 text-sm sm:text-base">
                    Open Main Website <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
            </div>
        </div>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="glass-card p-6 sm:p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 class="text-xl sm:text-2xl font-bold mb-6 text-center text-white"><i class="fa-solid fa-shield-halved text-blue-400 mr-2"></i>Admin Login</h2>
            <input type="email" id="email" placeholder="Email Address" class="w-full mb-4 px-4 py-3 rounded-lg bg-gray-800 border border-gray-600 focus:outline-none focus:border-blue-500 text-white transition text-sm sm:text-base">
            <input type="password" id="password" placeholder="Password" class="w-full mb-6 px-4 py-3 rounded-lg bg-gray-800 border border-gray-600 focus:outline-none focus:border-blue-500 text-white transition text-sm sm:text-base">
            <div class="flex flex-col-reverse sm:flex-row justify-end gap-2 sm:gap-3">
                <button onclick="closeModal('loginModal')" class="w-full sm:w-auto px-5 py-2.5 rounded-lg bg-gray-700 hover:bg-gray-600 transition font-medium text-sm sm:text-base">Cancel</button>
                <button id="submitLogin" class="w-full sm:w-auto px-5 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-500 transition font-medium shadow-lg text-sm sm:text-base">Login</button>
            </div>
        </div>
    </div>

    <div id="addModal" class="hidden fixed inset-0 bg-black bg-opacity-80 backdrop-blur-sm flex items-center justify-center z-50 p-3 sm:p-4">
        <div class="glass-card rounded-2xl w-full max-w-lg max-h-[95vh] flex flex-col shadow-2xl">
            <div class="p-4 sm:p-5 border-b border-gray-700 flex justify-between items-center bg-gray-800 bg-opacity-90 rounded-t-2xl">
                <h2 id="modalTitle" class="text-lg sm:text-xl font-bold text-white flex items-center gap-2"><i class="fa-solid fa-pen-to-square text-blue-400"></i> Add New Website</h2>
                <button onclick="closeModal('addModal')" class="text-gray-400 hover:text-red-400 transition bg-gray-700 hover:bg-gray-600 rounded-full w-8 h-8 flex items-center justify-center text-sm sm:text-base">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="p-4 sm:p-6 overflow-y-auto flex-1 space-y-3 sm:space-y-4">
                <div>
                    <label class="block text-xs sm:text-sm mb-1 text-gray-400 font-medium">Website Name</label>
                    <input type="text" id="siteName" class="w-full px-3 sm:px-4 py-2 sm:py-3 rounded-lg bg-gray-900 border border-gray-700 text-white focus:outline-none focus:border-blue-500 transition text-sm sm:text-base">
                </div>
                <div>
                    <label class="block text-xs sm:text-sm mb-1 text-gray-400 font-medium">Main URL</label>
                    <input type="url" id="siteUrl" class="w-full px-3 sm:px-4 py-2 sm:py-3 rounded-lg bg-gray-900 border border-gray-700 text-white focus:outline-none focus:border-blue-500 transition text-sm sm:text-base">
                </div>
                <div>
                    <label class="block text-xs sm:text-sm mb-1 text-gray-400 font-medium">Category / Tag</label>
                    <input type="text" id="siteCategory" list="categoryOptions" placeholder="e.g. Coding, Govt Website..." class="w-full px-3 sm:px-4 py-2 sm:py-3 rounded-lg bg-gray-900 border border-gray-700 text-white focus:outline-none focus:border-blue-500 transition text-sm sm:text-base">
                    <datalist id="categoryOptions">
                        <option value="Coding">
                        <option value="Govt Website">
                        <option value="Work">
                        <option value="Entertainment">
                        <option value="Tools">
                    </datalist>
                </div>
                <div>
                    <label class="block text-xs sm:text-sm mb-1 text-gray-400 font-medium">Logo Image URL</label>
                    <input type="text" id="siteLogo" class="w-full px-3 sm:px-4 py-2 sm:py-3 rounded-lg bg-gray-900 border border-gray-700 text-white focus:outline-none focus:border-blue-500 transition text-sm sm:text-base" placeholder="Optional">
                </div>
                
                <div class="pt-3 border-t border-gray-700">
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-xs sm:text-sm text-blue-300 font-medium">Direct Quick Links</label>
                        <button id="addMoreSublinkBtn" type="button" class="text-xs bg-gray-700 hover:bg-blue-600 px-3 py-1.5 rounded-md text-white transition flex items-center shadow">
                            <i class="fa-solid fa-plus mr-1.5"></i> Add Row
                        </button>
                    </div>
                    <div id="dynamicSublinksContainer" class="space-y-3"></div>
                </div>
            </div>
            
            <div class="p-4 sm:p-5 border-t border-gray-700 bg-gray-800 bg-opacity-90 rounded-b-2xl flex flex-col-reverse sm:flex-row justify-end gap-2 sm:gap-3">
                <button onclick="closeModal('addModal')" class="w-full sm:w-auto px-5 py-2.5 rounded-lg bg-gray-700 hover:bg-gray-600 transition font-medium text-sm sm:text-base">Cancel</button>
                <button id="saveLinkBtn" class="w-full sm:w-auto px-6 py-2.5 rounded-lg bg-green-500 hover:bg-green-400 text-gray-900 transition font-bold shadow-lg flex justify-center items-center gap-2 text-sm sm:text-base">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Save Data
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDNqZanl39q1wZdWBozONmtG-aWY-4vgCg",
            authDomain: "useful-4d6ac.firebaseapp.com",
            databaseURL: "https://useful-4d6ac-default-rtdb.firebaseio.com",
            projectId: "useful-4d6ac",
            storageBucket: "useful-4d6ac.firebasestorage.app",
            messagingSenderId: "277397818455",
            appId: "1:277397818455:web:736d9ee493b04c488fa712"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let isAdmin = false;
        let allLinksData = [];
        let editingId = null;
        let activeCategory = 'All'; 

        const sublinksContainer = document.getElementById('dynamicSublinksContainer');
        const searchInput = document.getElementById('searchInput');
        const loadingMsg = document.getElementById('loadingMsg');
        const loadingText = document.getElementById('loadingText');
        const spinnerIcon = document.getElementById('spinnerIcon');
        const linksContainer = document.getElementById('linksContainer');
        const categoryFiltersContainer = document.getElementById('categoryFilters');

        window.closeModal = (id) => {
            document.getElementById(id).classList.add('hidden');
            document.body.style.overflow = ''; 
            if(id === 'addModal') editingId = null;
        };
        window.openModal = (id) => {
            document.getElementById(id).classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        };

        window.handleImageError = (imgElement, cardId) => {
            imgElement.onerror = null; 
            imgElement.src = 'https://ui-avatars.com/api/?name=Offline&background=ef4444&color=fff&size=64';
            const badgeDiv = document.getElementById(`status-${cardId}`);
            if(badgeDiv) {
                badgeDiv.innerHTML = `<div class="absolute -top-3 sm:-top-4 left-1/2 transform -translate-x-1/2 bg-red-600 text-white text-[8px] sm:text-[10px] uppercase font-bold tracking-widest px-2 sm:px-3 py-0.5 sm:py-1 rounded-full shadow-[0_0_10px_rgba(220,38,38,0.8)] border border-red-800 animate-pulse z-20 flex items-center gap-1 whitespace-nowrap"><i class="fa-solid fa-triangle-exclamation"></i> Error</div>`;
            }
            const cardWrapper = document.getElementById(`card-wrapper-${cardId}`);
            if(cardWrapper) cardWrapper.classList.add('grayscale', 'opacity-80');
        };

        document.getElementById('viewModalLogo').onerror = function() {
            this.onerror = null;
            this.src = 'https://ui-avatars.com/api/?name=Offline&background=ef4444&color=fff&size=64';
            document.getElementById('modalMaintenanceBadge').classList.remove('hidden');
        };

        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.getElementById('loginBtn').classList.toggle('hidden', isAdmin);
            document.getElementById('logoutBtn').classList.toggle('hidden', !isAdmin);
            document.getElementById('addBtn').classList.toggle('hidden', !isAdmin);
            renderLinks();
        });

        document.getElementById('loginBtn').addEventListener('click', () => openModal('loginModal'));
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
        document.getElementById('submitLogin').addEventListener('click', async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                closeModal('loginModal');
            } catch (error) { alert('Login Failed: ' + error.message); }
        });

        function createSublinkRow(name = '', url = '') {
            const row = document.createElement('div');
            row.className = 'flex flex-col sm:flex-row gap-2 items-stretch sm:items-center bg-gray-900/80 p-3 sm:p-2 rounded-lg border border-gray-700';
            row.innerHTML = `
                <input type="text" placeholder="Link Name" value="${name}" class="sublink-name w-full sm:w-1/3 px-3 py-2 rounded-md bg-gray-800 border border-gray-600 text-white text-sm focus:border-blue-500 outline-none">
                <input type="url" placeholder="URL" value="${url}" class="sublink-url w-full sm:flex-1 px-3 py-2 rounded-md bg-gray-800 border border-gray-600 text-white text-sm focus:border-blue-500 outline-none">
                <button type="button" class="w-full sm:w-auto mt-1 sm:mt-0 text-red-400 bg-red-500/10 sm:bg-transparent hover:bg-red-500/20 sm:hover:bg-transparent hover:text-red-300 px-3 py-2 transition flex justify-center items-center gap-2 rounded-md text-sm"><i class="fa-solid fa-trash-can"></i> <span class="sm:hidden">Remove</span></button>
            `;
            row.querySelector('button').addEventListener('click', () => row.remove());
            sublinksContainer.appendChild(row);
        }
        document.getElementById('addMoreSublinkBtn').addEventListener('click', () => createSublinkRow());

        document.getElementById('addBtn').addEventListener('click', () => {
            editingId = null;
            document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-pen-to-square text-blue-400"></i> Add New Website';
            document.getElementById('siteName').value = '';
            document.getElementById('siteUrl').value = '';
            document.getElementById('siteCategory').value = '';
            document.getElementById('siteLogo').value = '';
            sublinksContainer.innerHTML = '';
            createSublinkRow();
            openModal('addModal');
        });

        // Backend functions
        window.toggleStar = async (id) => {
            const item = allLinksData.find(link => link.id === id);
            if(item) {
                try { await update(ref(db, 'websites/' + id), { isStarred: !item.isStarred }); } 
                catch(error) { alert("Error updating star status: " + error.message); }
            }
        };

        window.editLink = (id) => {
            const item = allLinksData.find(link => link.id === id);
            if(item) {
                editingId = id;
                document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-pen-to-square text-blue-400"></i> Edit Website';
                document.getElementById('siteName').value = item.name || '';
                document.getElementById('siteUrl').value = item.mainUrl || '';
                document.getElementById('siteCategory').value = item.category || 'Other';
                document.getElementById('siteLogo').value = item.logo || '';
                sublinksContainer.innerHTML = '';
                if(item.sublinks && Array.isArray(item.sublinks) && item.sublinks.length > 0) {
                    item.sublinks.forEach(link => createSublinkRow(link.name, link.url));
                } else { createSublinkRow(); }
                openModal('addModal');
            }
        };

        window.deleteLink = async (id) => {
            if(confirm('Delete this website permanently?')) {
                await remove(ref(db, 'websites/' + id));
            }
        };

        document.getElementById('saveLinkBtn').addEventListener('click', async () => {
            const btn = document.getElementById('saveLinkBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;

            const name = document.getElementById('siteName').value.trim();
            const url = document.getElementById('siteUrl').value.trim();
            const logo = document.getElementById('siteLogo').value.trim();
            const category = document.getElementById('siteCategory').value.trim() || 'Other';
            
            if(!name || !url) {
                alert("Website Name and Main URL are required!");
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Save Data';
                btn.disabled = false;
                return;
            }

            let sublinks = [];
            const rows = sublinksContainer.children;
            for(let i = 0; i < rows.length; i++) {
                const subName = rows[i].querySelector('.sublink-name').value.trim();
                const subUrl = rows[i].querySelector('.sublink-url').value.trim();
                if(subName && subUrl) sublinks.push({ name: subName, url: subUrl });
            }

            try {
                if(editingId) {
                    const existingItem = allLinksData.find(item => item.id === editingId);
                    const isStarred = existingItem ? !!existingItem.isStarred : false;
                    await update(ref(db, 'websites/' + editingId), { name, mainUrl: url, logo, category, sublinks, isStarred });
                } else {
                    await push(ref(db, 'websites'), { name, mainUrl: url, logo, category, sublinks, isStarred: false, createdAt: Date.now() });
                }
                closeModal('addModal');
            } catch (error) { alert("Data Save Failed! Error: " + error.message); } 
            finally {
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Save Data';
                btn.disabled = false;
            }
        });

        window.openViewModal = (id) => {
            const data = allLinksData.find(d => d.id === id);
            if(!data) return;
            
            document.getElementById('modalMaintenanceBadge').classList.add('hidden');
            document.getElementById('viewModalTitle').innerText = data.name || 'Website';
            document.getElementById('viewModalLogo').src = data.logo || 'https://via.placeholder.com/64?text=Link';
            document.getElementById('viewModalMainLink').href = data.mainUrl || '#';
            
            const viewLinksContainer = document.getElementById('viewModalLinks');
            viewLinksContainer.innerHTML = '';
            
            if(data.sublinks && Array.isArray(data.sublinks) && data.sublinks.length > 0) {
                data.sublinks.forEach(link => {
                    const subName = link.name || 'Link';
                    const subUrl = link.url || '#';
                    viewLinksContainer.innerHTML += `
                        <a href="${subUrl}" target="_blank" class="flex items-center justify-between p-3 sm:p-3.5 bg-gray-900/80 hover:bg-gray-700 border border-gray-600 rounded-xl transition group text-sm sm:text-base">
                            <span class="font-medium text-blue-100 flex items-center gap-2 truncate">
                                <i class="fa-solid fa-link text-gray-500 text-xs sm:text-sm"></i> ${subName}
                            </span>
                            <i class="fa-solid fa-arrow-right text-gray-600 group-hover:text-blue-400 transition transform group-hover:translate-x-1 flex-shrink-0"></i>
                        </a>
                    `;
                });
            } else {
                viewLinksContainer.innerHTML = '<p class="text-gray-500 text-center py-6 text-sm">No direct links added.</p>';
            }
            openModal('viewModal');
        };

        function renderCategoryFilters() {
            const uniqueCategories = [...new Set(allLinksData.map(item => String(item.category || 'Other')))];
            uniqueCategories.sort();
            const categoriesToRender = ['All', ...uniqueCategories];

            categoryFiltersContainer.innerHTML = '';
            categoriesToRender.forEach(cat => {
                const btn = document.createElement('button');
                btn.innerText = cat;
                if(activeCategory === cat) {
                    btn.className = 'snap-start px-4 sm:px-5 py-1.5 sm:py-2 rounded-full text-xs sm:text-sm font-bold whitespace-nowrap transition bg-blue-600 text-white shadow-lg shadow-blue-900/50 scale-105';
                } else {
                    btn.className = 'snap-start px-4 sm:px-5 py-1.5 sm:py-2 rounded-full text-xs sm:text-sm font-medium whitespace-nowrap transition bg-gray-800 border border-gray-600 text-gray-300 hover:bg-gray-700 hover:text-white';
                }
                btn.onclick = () => {
                    activeCategory = cat;
                    renderCategoryFilters(); 
                    renderLinks(); 
                };
                categoryFiltersContainer.appendChild(btn);
            });
        }

        function hideLoaderShowGrid() {
            if(!loadingMsg.classList.contains('hidden')) { loadingMsg.classList.add('hidden'); }
            if(linksContainer.classList.contains('hidden')) {
                linksContainer.classList.remove('hidden');
                linksContainer.classList.add('grid');
            }
        }

        function showLoaderError(msg) {
            loadingMsg.classList.remove('hidden');
            linksContainer.classList.add('hidden');
            document.getElementById('spinnerIcon').className = "fa-solid fa-triangle-exclamation text-red-500 text-4xl mb-4";
            document.getElementById('loadingText').innerHTML = msg;
        }

        try {
            const cachedData = localStorage.getItem('myLinkHubCache');
            if (cachedData) {
                const parsedData = JSON.parse(cachedData);
                if(Array.isArray(parsedData)) {
                    allLinksData = parsedData;
                    hideLoaderShowGrid();
                    renderCategoryFilters();
                    renderLinks();
                }
            }
        } catch(e) { localStorage.removeItem('myLinkHubCache'); }

        onValue(ref(db, 'websites'), (snapshot) => {
            try {
                allLinksData = [];
                const data = snapshot.val();
                
                if(data && typeof data === 'object') {
                    Object.keys(data).forEach(key => {
                        allLinksData.push({ id: key, ...data[key] });
                    });
                }
                
                try { localStorage.setItem('myLinkHubCache', JSON.stringify(allLinksData)); } 
                catch(err) {} 
                
                hideLoaderShowGrid();
                renderCategoryFilters();
                renderLinks();
            } catch(renderError) {
                console.error(renderError);
                showLoaderError("Data processing failed.");
            }
        }, (error) => {
            console.error(error);
            showLoaderError("Database Connection Failed!");
        });

        searchInput.addEventListener('input', renderLinks);

        function renderLinks() {
            const query = searchInput.value.toLowerCase();
            linksContainer.innerHTML = ''; 
            
            let filteredData = allLinksData.filter(data => {
                const nameStr = data.name ? String(data.name).toLowerCase() : '';
                const categoryStr = data.category ? String(data.category) : 'Other';
                
                let matchesSearch = nameStr.includes(query);
                
                if(!matchesSearch && data.sublinks && Array.isArray(data.sublinks)) {
                    matchesSearch = data.sublinks.some(sub => {
                        const subName = sub.name ? String(sub.name).toLowerCase() : '';
                        return subName.includes(query);
                    });
                }
                
                const matchesCategory = activeCategory === 'All' || categoryStr === activeCategory;
                return matchesSearch && matchesCategory;
            });

            filteredData.sort((a, b) => {
                const starA = a.isStarred ? 1 : 0;
                const starB = b.isStarred ? 1 : 0;
                return starB - starA; 
            });

            if(allLinksData.length === 0) {
                linksContainer.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center mt-10 sm:mt-20 text-gray-400">
                        <i class="fa-solid fa-box-open text-5xl sm:text-6xl mb-4 text-gray-600 drop-shadow-lg"></i>
                        <p class="text-lg sm:text-xl">Your Hub is empty.</p>
                        ${isAdmin ? `<p class="text-sm mt-2 text-green-500">Click 'Add Link' to start!</p>` : ''}
                    </div>`;
                return;
            }

            if(filteredData.length === 0) {
                linksContainer.innerHTML = `<p class="col-span-full text-center mt-10 text-gray-400">No links found in this category or search.</p>`;
                return;
            }
            
            filteredData.forEach(data => {
                const card = document.createElement('div');
                card.id = `card-wrapper-${data.id}`;
                card.className = `glass-card rounded-2xl p-3 sm:p-4 flex flex-col relative group h-full cursor-pointer hover:border-blue-500/50 ${data.isStarred ? 'border-yellow-500/50' : 'border-gray-700'}`;
                
                card.addEventListener('click', (e) => {
                    const isBtnClicked = e.target.closest('.btn-action');
                    if (!isBtnClicked) {
                        window.openViewModal(data.id);
                    }
                });

                const safeName = data.name || 'Unknown';
                const safeCategory = data.category || 'Other';
                const safeLogo = data.logo || 'https://via.placeholder.com/64?text=Link';

                const categoryBadge = `<div class="absolute bottom-14 left-1/2 transform -translate-x-1/2 bg-gray-900/80 border border-gray-600 text-gray-300 px-2 py-0.5 rounded-md text-[10px] whitespace-nowrap">${safeCategory}</div>`;

                card.innerHTML = `
                    <div id="status-${data.id}"></div>
                    ${data.isStarred ? `<div class="absolute top-2 left-2 sm:top-3 sm:left-3 text-yellow-400 text-sm sm:text-lg drop-shadow-[0_0_8px_rgba(250,204,21,0.6)] z-10"><i class="fa-solid fa-star"></i></div>` : ''}

                    ${isAdmin ? `
                    <div class="admin-btns absolute top-1 right-1 sm:top-2 sm:right-2 flex gap-1 bg-gray-900/90 px-1.5 py-1 sm:px-2 sm:py-1.5 rounded-lg opacity-100 lg:opacity-0 group-hover:opacity-100 transition z-30 shadow">
                        <button onclick="window.toggleStar('${data.id}')" class="btn-action ${data.isStarred ? 'text-yellow-400' : 'text-gray-400'} hover:text-yellow-300 p-1 rounded transition" title="Star"><i class="fa-solid fa-star text-xs sm:text-sm"></i></button>
                        <button onclick="window.editLink('${data.id}')" class="btn-action text-blue-400 hover:text-blue-300 p-1 rounded transition" title="Edit"><i class="fa-solid fa-pen text-xs sm:text-sm"></i></button>
                        <button onclick="window.deleteLink('${data.id}')" class="btn-action text-red-500 hover:text-red-400 p-1 rounded transition" title="Delete"><i class="fa-solid fa-trash text-xs sm:text-sm"></i></button>
                    </div>
                    ` : ''}
                    
                    <div class="flex flex-col items-center mb-6 mt-4 sm:mt-2 relative">
                        <div class="w-12 h-12 sm:w-16 sm:h-16 md:w-20 md:h-20 mb-2 sm:mb-3 bg-white/90 rounded-2xl shadow-xl flex items-center justify-center p-2 sm:p-2.5 overflow-hidden transition transform group-hover:scale-105 z-10">
                            <img src="${safeLogo}" alt="${safeName}" loading="lazy" onerror="handleImageError(this, '${data.id}')" class="w-full h-full object-contain drop-shadow-md">
                        </div>
                        <h3 class="text-sm sm:text-lg md:text-xl font-bold text-center text-white truncate w-full px-1 z-10">${safeName}</h3>
                        ${categoryBadge}
                    </div>
                    
                    <div class="mt-auto pt-3 sm:pt-4 border-t border-gray-600/30 relative z-10">
                        <div class="w-full text-center text-xs sm:text-sm text-blue-300 font-medium py-1.5 sm:py-2 rounded-lg bg-gray-800/50 group-hover:bg-blue-600 group-hover:text-white transition flex justify-center items-center gap-1 sm:gap-2">
                            <span>Open Links</span> <i class="fa-solid fa-arrow-pointer text-[10px] sm:text-xs"></i>
                        </div>
                    </div>
                `;
                linksContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
